name: BloodConnect CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test app imports correctly
        run: python -c "from app import app; print('App imports OK')"

      - name: Build Docker image
        run: docker build -t bloodconnect .

      - name: Success notification
        run: echo "BloodConnect build successful and ready for deployment"
