{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:420px;margin:2rem auto;">

  <div class="page-header">
    <h1>Donor Login</h1>
    <p>Welcome back. Ready to save lives?</p>
  </div>

  <form method="POST">

    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" required>
    </div>

    <button type="submit" class="btn btn-red" style="width:100%;">
      Login
    </button>

  </form>

  <p style="margin-top:1rem;font-size:.8rem;color:var(--grey);text-align:center;">
    New donor? <a href="/register">Register here</a>
  </p>

</div>

{% endblock %}
